name: Sync Tag with JS Version

on:
  push:
    branches:
      - main
      - master

jobs:
  tag-only:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version from JS
        id: get_version
        run: |
          VERSION=$(grep -oP 'Ordered Sliders Card %c v\K[0-9]+\.[0-9]+\.[0-9]+' dist/ordered-sliders-card.js | head -n 1)

          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from dist/ordered-sliders-card.js"
            exit 1
          fi

          TAG="v$VERSION"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Found version: $TAG"

      - name: Push Tag
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
          else
            echo "Creating and pushing tag $TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
